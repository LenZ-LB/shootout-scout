name: Build vs-Goalie Splits

on:
  workflow_dispatch:
    inputs:
      start_season:
        description: "Start season (8-digit, e.g. 20052006)"
        type: string
        default: "20052006"
      end_season:
        description: "End season (8-digit, e.g. 20252026)"
        type: string
        default: "20252026"

permissions:
  contents: write

jobs:
  build-splits:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Test direct split write
        run: python test_splits.py

      - name: Init database (migrates schema if needed)
        run: python nhl_shootout_pipeline.py --init-db

      - name: Build vs-goalie splits ${{ github.event.inputs.start_season }} to ${{ github.event.inputs.end_season }}
        run: python nhl_shootout_pipeline.py --build-splits ${{ github.event.inputs.start_season }} ${{ github.event.inputs.end_season }} --debug

      - name: Show what was generated
        run: |
          echo "--- vs_goalie_splits count ---"
          python3 -c "import sqlite3; conn=sqlite3.connect('shootout.db'); print(conn.execute('SELECT COUNT(*) FROM vs_goalie_splits').fetchone()[0], 'pairs')"
          echo "--- McDavid splits ---"
          python3 -c "import sqlite3; conn=sqlite3.connect('shootout.db'); [print(r) for r in conn.execute('SELECT * FROM vs_goalie_splits WHERE player_id=8478402').fetchall()]"

      - name: Commit updated data
        run: |
          git config user.name "shootout-scout-bot"
          git config user.email "actions@users.noreply.github.com"
          mkdir -p data
          git add -A data shootout.db
          git diff --cached --quiet || git commit -m "Build vs-goalie splits ${{ github.event.inputs.start_season }}-${{ github.event.inputs.end_season }}"
          git push
