name: Update Shootout Data

on:
  workflow_dispatch:
    inputs:
      run_full_update:
        description: "Also refresh rosters (do after trades/call-ups)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Init database (safe to re-run)
        run: python nhl_shootout_pipeline.py --init-db

      - name: Refresh rosters
        if: ${{ github.event.inputs.run_full_update == 'true' }}
        run: python nhl_shootout_pipeline.py --update-rosters

      - name: Pull current season shootout stats
        run: python nhl_shootout_pipeline.py --backfill 20252026 20252026 --debug

      - name: Export JSON for the page
        run: python nhl_shootout_pipeline.py --export-json

      - name: Show what was generated (debug)
        run: |
          echo "--- shootout.db ---"
          ls -la shootout.db 2>&1 || echo "shootout.db missing"
          echo "--- data/ ---"
          ls -la data/ 2>&1 || echo "data/ missing"
          echo "--- players.json preview ---"
          head -c 500 data/players.json 2>&1 || echo "players.json missing"

      - name: Commit updated data
        run: |
          git config user.name "shootout-scout-bot"
          git config user.email "actions@users.noreply.github.com"
          mkdir -p data
          git add -A data shootout.db
          git diff --cached --quiet || git commit -m "Update shootout data ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push
