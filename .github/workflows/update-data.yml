name: Update Shootout Data

on:
  schedule:
    - cron: '0 10 * * *'  # 10am UTC = 3am MT, runs every morning after overnight games
  workflow_dispatch:
    inputs:
      run_full_update:
        description: "Also refresh rosters (do after trades/call-ups)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Init database (migrates schema if needed)
        run: python nhl_shootout_pipeline.py --init-db

      - name: Pull current season shootout stats
        run: python nhl_shootout_pipeline.py --backfill 20252026 20252026 --debug

      - name: Update vs-goalie splits and attempt detail (current season)
        run: python nhl_shootout_pipeline.py --build-splits 20252026 20252026 --debug

      - name: Backfill any missing game dates
        run: python nhl_shootout_pipeline.py --backfill-dates

      - name: Refresh rosters
        if: ${{ github.event.inputs.run_full_update == 'true' || github.event_name == 'schedule' }}
        run: python nhl_shootout_pipeline.py --update-rosters

      - name: Export JSON for the page
        run: python nhl_shootout_pipeline.py --export-json

      - name: Commit updated data
        run: |
          git config user.name "shootout-scout-bot"
          git config user.email "actions@users.noreply.github.com"
          mkdir -p data
          git add -A data shootout.db
          git diff --cached --quiet || git commit -m "Update shootout data ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push
