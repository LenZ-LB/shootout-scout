name: Backfill Shootout History

# Run this a few times with different year ranges to build up full history
# without risking a timeout — e.g. first 2023-2026, then 2019-2023, then
# 2015-2019, then 2005-2015. Each run appends to the existing database.
on:
  workflow_dispatch:
    inputs:
      start_year:
        description: "Start year (e.g. 2023 means the 2023-24 season)"
        type: string
        default: "2023"
      end_year:
        description: "End year, exclusive (e.g. 2026 covers up through 2025-26)"
        type: string
        default: "2026"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Init database (safe to re-run)
        run: python nhl_shootout_pipeline.py --init-db

      - name: Backfill ${{ github.event.inputs.start_year }} to ${{ github.event.inputs.end_year }}
        run: python nhl_shootout_pipeline.py --backfill ${{ github.event.inputs.start_year }} ${{ github.event.inputs.end_year }} --debug

      - name: Export JSON for the page
        run: python nhl_shootout_pipeline.py --export-json

      - name: Show what was generated (debug)
        run: |
          echo "--- shootout.db ---"
          ls -la shootout.db 2>&1 || echo "shootout.db missing"
          echo "--- data/ ---"
          ls -la data/ 2>&1 || echo "data/ missing"
          echo "--- players.json preview ---"
          head -c 500 data/players.json 2>&1 || echo "players.json missing"

      - name: Commit updated data
        run: |
          git config user.name "shootout-scout-bot"
          git config user.email "actions@users.noreply.github.com"
          mkdir -p data
          git add -A data shootout.db
          git diff --cached --quiet || git commit -m "Backfill ${{ github.event.inputs.start_year }}-${{ github.event.inputs.end_year }}"
          git push
