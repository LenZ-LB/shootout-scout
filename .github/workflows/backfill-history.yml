name: Backfill Shootout History

on:
  workflow_dispatch:
    inputs:
      start_season:
        description: "Start season (8-digit, e.g. 20052006)"
        type: string
        default: "20052006"
      end_season:
        description: "End season (8-digit, e.g. 20252026)"
        type: string
        default: "20252026"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Diagnose API field names
        run: python diagnose_api.py

      - name: Init database (safe to re-run)
        run: python nhl_shootout_pipeline.py --init-db

      - name: Backfill ${{ github.event.inputs.start_season }} to ${{ github.event.inputs.end_season }}
        run: python nhl_shootout_pipeline.py --backfill ${{ github.event.inputs.start_season }} ${{ github.event.inputs.end_season }} --debug

      - name: Export JSON for the page
        run: python nhl_shootout_pipeline.py --export-json

      - name: Show what was generated (debug)
        run: |
          echo "--- shootout.db ---"
          ls -la shootout.db 2>&1 || echo "shootout.db missing"
          echo "--- data/ ---"
          ls -la data/ 2>&1 || echo "data/ missing"
          echo "--- players.json preview (first 500 chars) ---"
          head -c 500 data/players.json 2>&1 || echo "players.json missing"

      - name: Commit updated data
        run: |
          git config user.name "shootout-scout-bot"
          git config user.email "actions@users.noreply.github.com"
          mkdir -p data
          git add -A data shootout.db
          git diff --cached --quiet || git commit -m "Backfill ${{ github.event.inputs.start_season }}-${{ github.event.inputs.end_season }}"
          git push
