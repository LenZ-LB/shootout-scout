<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>Edmonton Oilers Shootout Scout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A1220; --panel:#101B30; --panel-elev:#182541; --line:#233355;
    --ink:#EDF2F8; --ink-muted:#7E93B0; --ink-dim:#4E6182;
    --goal:#E64B3F; --save:#4FA3D1; --hot:#F5B942; --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:radial-gradient(ellipse at top, #0E1830 0%, var(--bg) 55%);
    color:var(--ink); font-family:'Inter',sans-serif; min-height:100vh; padding:20px;
  }
  .status-banner{
    max-width:1280px;margin:0 auto 16px; font-size:12.5px; padding:8px 14px; border-radius:8px;
    display:flex; align-items:center; gap:8px;
  }
  .status-banner.sample{background:#3A2E12;border:1px solid #6B5420;color:#F0C972;}
  .status-banner.live{background:#12301E;border:1px solid #245A38;color:#7FE0A8;}
  .wrap{max-width:1280px;margin:0 auto;}

  .scoreboard{
    background:linear-gradient(180deg,var(--panel-elev),var(--panel));
    border:1px solid var(--line); border-radius:var(--radius); padding:16px 22px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px;
    margin-bottom:14px;
  }
  .matchup-title{
    font-family:'Oswald',sans-serif; font-weight:600; letter-spacing:0.5px; font-size:26px;
    display:flex; align-items:baseline; gap:10px;
  }
  .matchup-title .vs{color:var(--ink-muted); font-size:16px; font-weight:500;}

  .search-box{position:relative; width:280px;}
  .search-box input{
    width:100%; padding:10px 14px; border-radius:8px;
    background:var(--bg); border:1px solid var(--line); color:var(--ink);
    font-family:'Inter'; font-size:13.5px;
  }
  .search-box input:focus{outline:2px solid var(--save); outline-offset:1px;}
  .search-box input::placeholder{color:var(--ink-dim);}
  .search-results{
    position:absolute; top:calc(100% + 6px); left:0; right:0;
    background:var(--panel-elev); border:1px solid var(--line); border-radius:8px;
    max-height:280px; overflow-y:auto; z-index:20; display:none;
  }
  .search-results.show{display:block;}
  .search-result-row{
    padding:9px 12px; font-size:13px; cursor:pointer;
    display:flex; justify-content:space-between; border-bottom:1px solid var(--line);
  }
  .search-result-row:last-child{border-bottom:none;}
  .search-result-row:hover{background:var(--bg);}
  .search-result-row .team-tag{color:var(--ink-muted); font-family:'IBM Plex Mono'; font-size:11px;}

  /* Team selector bar */
  .selector-bar{
    display:flex; align-items:center; gap:12px; margin-bottom:18px; flex-wrap:wrap;
  }
  .team-select{
    background:var(--panel); border:1px solid var(--line); color:var(--ink);
    padding:10px 14px; border-radius:8px; font-family:'Oswald'; font-size:14px;
    letter-spacing:0.4px; min-width:220px;
  }
  .team-select:focus{outline:2px solid var(--save); outline-offset:1px;}
  .selector-bar .vs-label{color:var(--ink-muted); font-family:'Oswald'; font-size:14px;}

  .legend{display:flex; gap:18px; font-size:12px; color:var(--ink-muted); margin-bottom:14px; flex-wrap:wrap;}
  .legend span{display:flex; align-items:center; gap:6px;}

  .panels{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media (max-width:860px){ .panels{grid-template-columns:1fr;} }

  .team-panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  .team-header{
    padding:12px 16px; border-bottom:1px solid var(--line);
    font-family:'Oswald'; letter-spacing:0.6px; font-size:15px; font-weight:600;
    display:flex; justify-content:space-between; align-items:center; background:var(--panel-elev);
  }
  .team-header .opp-goalie{font-size:11px; font-family:'IBM Plex Mono'; color:var(--ink-muted); font-weight:400; letter-spacing:0; text-align:right; white-space:normal; max-width:60%;}

  table{width:100%; border-collapse:collapse; font-size:12.5px; table-layout:auto;}
  thead th{
    position:sticky; top:0; text-align:right; font-family:'IBM Plex Mono'; font-weight:600; font-size:10px;
    color:var(--ink-dim); text-transform:uppercase; letter-spacing:0.3px;
    padding:7px 7px; border-bottom:1px solid var(--line); white-space:nowrap;
    cursor:pointer; user-select:none;
  }
  thead th:hover{color:var(--ink-muted);}
  thead th.sort-asc::after{content:' ▲'; color:var(--save);}
  thead th.sort-desc::after{content:' ▼'; color:var(--save);}
  thead th:first-child{text-align:left; cursor:default;}
  thead th:first-child::after{content:'';}
  tbody td{padding:7px 7px; border-bottom:1px solid #16223B; text-align:right; white-space:nowrap;}
  tbody td:first-child{text-align:left; white-space:normal;}
  tbody tr:hover{background:#131F38;}
  .detail-row td{ padding:0 !important; border-bottom:2px solid var(--line) !important; }
  .detail-panel{
    background:#0D1828; padding:14px 16px; display:grid;
    grid-template-columns:1fr 1fr; gap:16px;
  }
  .detail-section h4{
    font-family:'Oswald'; font-size:12px; letter-spacing:0.5px;
    color:var(--ink-muted); margin:0 0 8px; text-transform:uppercase;
  }
  .detail-table{ width:100%; font-size:11px; border-collapse:collapse; }
  .detail-table td{ padding:3px 8px; border-bottom:1px solid #1A2A45; }
  .detail-table td:last-child{ text-align:right; font-family:'IBM Plex Mono'; }
  .detail-table tr:last-child td{ border-bottom:none; }
  .shot-bar{
    display:inline-block; height:6px; background:var(--save);
    border-radius:3px; vertical-align:middle; margin-left:6px;
  }
  .player-name{font-weight:500; cursor:pointer;}
  .player-name:hover{ color:var(--save); }
  .player-num{color:var(--ink-dim); font-family:'IBM Plex Mono'; font-size:10px; font-weight:500;}
  .pct{font-family:'IBM Plex Mono'; font-weight:600;}
  .pct.hot{color:var(--hot);}
  .pct.cold{color:var(--ink-dim);}
  .no-data{color:var(--ink-dim); font-style:italic;}
  .vsg-col{background:#1B2846; width:52px; min-width:52px;}
  thead th.vsg-col{
    white-space:nowrap;
    writing-mode:horizontal-tb;
    height:auto;
    vertical-align:bottom;
    padding:7px 7px;
    text-align:right;
  }
  .empty-panel{padding:26px 16px; color:var(--ink-muted); font-size:13px; text-align:center;}

  .goalie-row{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px;}
  @media (max-width:860px){ .goalie-row{grid-template-columns:1fr;} }
  .goalie-col{display:flex; flex-direction:column; gap:10px;}
  .goalie-card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 18px; display:flex; justify-content:space-between; align-items:center; gap:12px;
  }
  .goalie-card h3{margin:0 0 4px; font-family:'Oswald'; font-size:16px; font-weight:600;}
  .goalie-card .record{color:var(--ink-muted); font-size:12px;}
  .goalie-stat{text-align:right;}
  .goalie-stat .big{font-family:'IBM Plex Mono'; font-size:22px; font-weight:600; color:var(--save);}
  .goalie-stat .lbl{font-size:10.5px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:0.4px;}

  .section-toggle{margin-top:20px; background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  .so-order-table th{
    font-family:'IBM Plex Mono';font-size:10px;color:var(--ink-dim);
    text-transform:uppercase;letter-spacing:0.4px;padding:6px 10px;
    border-bottom:1px solid var(--line);text-align:left;
  }
  .so-order-table td{padding:6px 10px;border-bottom:1px solid #16223B;vertical-align:top;}
  .so-order-table tr:hover{background:#131F38;}
  .attempt-chip{
    display:inline-flex;align-items:center;gap:4px;
    padding:3px 8px;border-radius:4px;font-size:11px;margin:1px 2px;
    font-family:'IBM Plex Mono';
  }
  .attempt-chip.goal{background:#2A1A1A;border:1px solid var(--goal);color:var(--goal);}
  .attempt-chip.save{background:#1A2030;border:1px solid var(--save);color:var(--save);}
  .attempt-chip.miss{background:#1A1F2A;border:1px solid var(--ink-dim);color:var(--ink-dim);}
  /* Hot/cold streak in detail dropdown */
  .streak-hot{color:var(--hot);font-size:11px;font-family:'IBM Plex Mono';}
  .streak-cold{color:var(--ink-dim);font-size:11px;font-family:'IBM Plex Mono';}
  .section-toggle summary{
    padding:12px 16px; cursor:pointer; font-family:'Oswald'; font-size:14px; letter-spacing:0.4px;
    display:flex; justify-content:space-between; align-items:center; list-style:none; background:var(--panel-elev);
  }
  .section-toggle summary::-webkit-details-marker{display:none;}
  .section-toggle summary::after{content:'+'; font-size:18px; color:var(--ink-muted);}
  .section-toggle[open] summary::after{content:'\2013';}
  .section-body{padding:14px 16px;}
  .alltime-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
  @media (max-width:760px){ .alltime-grid{grid-template-columns:1fr;} }
  @media print {
    * { -webkit-print-color-adjust:exact; print-color-adjust:exact; }

    body{ background:white !important; color:#111 !important; padding:0; margin:0; font-family:'Inter',sans-serif; }

    /* Hide everything except the essentials */
    .status-banner, .selector-bar, .search-box, #printBtn,
    .section-toggle, .legend, #searchResults { display:none !important; }

    .wrap{ max-width:100% !important; padding:0 !important; }

    /* Header */
    .scoreboard{
      background:white !important; border:none !important;
      border-bottom:2.5px solid #111 !important;
      padding:8px 0 6px !important;
      display:flex !important; justify-content:space-between !important; align-items:flex-end !important;
      margin-bottom:10px !important;
    }
    .matchup-title{ color:#111 !important; font-size:18px !important; letter-spacing:0.5px !important; }
    .matchup-title .vs{ color:#444 !important; }
    #gameMeta{ color:#444 !important; font-size:10px !important; margin-top:2px !important; }

    /* Two panels side by side */
    .panels{
      display:grid !important;
      grid-template-columns:1fr 1fr !important;
      gap:10px !important;
      margin-bottom:10px !important;
    }

    .team-panel{
      border:1.5px solid #ccc !important;
      background:white !important;
      border-radius:0 !important;
      page-break-inside:avoid;
    }

    .team-header{
      background:#1a1a2e !important;
      color:white !important;
      padding:6px 10px !important;
      font-size:11px !important;
      letter-spacing:0.8px !important;
      display:flex !important;
      justify-content:space-between !important;
      align-items:flex-start !important;
      gap:6px !important;
    }
    .opp-goalie{ color:#ccc !important; font-size:8px !important; text-align:right !important; white-space:normal !important; max-width:55% !important; line-height:1.4 !important; }

    table{ width:100% !important; border-collapse:collapse !important; font-size:7px !important; table-layout:fixed !important; }
    thead th{
      background:#f0f0f0 !important; color:#333 !important;
      border-bottom:1.5px solid #999 !important;
      padding:3px 3px !important; font-size:6.5px !important;
      letter-spacing:0.2px !important; white-space:nowrap !important;
      overflow:hidden !important;
    }
    thead th:first-child{ text-align:left !important; width:24% !important; }
    thead th:nth-child(2){ width:10% !important; }
    thead th:nth-child(3){ width:7% !important; }
    thead th:nth-child(4){ width:9% !important; }
    thead th:nth-child(5){ width:9% !important; }
    thead th.vsg-col{ width:8% !important; }
    tbody td{
      padding:3px 3px !important;
      border-bottom:1px solid #e8e8e8 !important;
      color:#111 !important; overflow:hidden !important;
      text-overflow:ellipsis !important; white-space:nowrap !important;
    }
    tbody td:first-child{ text-align:left !important; font-size:7px !important; }
    tbody tr:nth-child(even){ background:#fafafa !important; }
    tbody tr:hover{ background:transparent !important; }
    .vsg-col{ background:#eef3ff !important; }
    .pct.hot{ color:#8B6914 !important; font-weight:700 !important; }
    .pct.cold{ color:#999 !important; }
    .no-data{ color:#bbb !important; }
    .no-attempts{ display:none !important; }
    .detail-row{ display:none !important; }
    #searchModal{ display:none !important; }
    .player-name{ color:#111 !important; cursor:default !important; }
    .player-num{ color:#888 !important; font-size:6px !important; }

    /* Goalie cards - slim horizontal strips */
    .goalie-row{
      display:grid !important;
      grid-template-columns:1fr 1fr !important;
      gap:10px !important;
      margin-top:8px !important;
      page-break-inside:avoid;
    }
    .goalie-col{ display:flex !important; flex-direction:column !important; gap:5px !important; }
    .goalie-card{
      border:1.5px solid #ccc !important;
      background:white !important;
      border-radius:0 !important;
      padding:6px 10px !important;
      display:flex !important;
      justify-content:space-between !important;
      align-items:center !important;
    }
    .goalie-card h3{ color:#111 !important; font-size:9px !important; margin:0 0 1px !important; }
    .goalie-card .record{ color:#555 !important; font-size:7.5px !important; }
    .goalie-stat .big{ color:#1a3a6b !important; font-size:14px !important; font-weight:700 !important; }
    .goalie-stat .lbl{ color:#555 !important; font-size:7.5px !important; }

    /* Notes line at bottom */
    .print-notes{
      margin-top:12px;
      border-top:1px solid #ccc;
      padding-top:6px;
    }
    .print-notes-label{
      font-size:8px; color:#777; text-transform:uppercase;
      letter-spacing:0.5px; margin-bottom:20px;
    }
    .print-notes-line{
      border-bottom:1px solid #ddd; margin-bottom:12px; height:1px;
    }

    /* Notes section - only visible in print */
    .print-notes{ display:block !important; }

    @page{ margin:1cm 1.2cm; size:letter portrait; }
  }
</style>
</head>

<div class="wrap">

        background:var(--panel-elev);border:1px solid var(--line);color:var(--ink-muted);

        letter-spacing:0.4px;cursor:pointer;text-transform:uppercase;">

  <div class="panels" id="panels"></div>

  <div class="print-notes" style="display:none;" id="printNotes">
    <div class="print-notes-label">Notes</div>
    <div class="print-notes-line"></div>
    <div class="print-notes-line"></div>

    </div>
  </details>

  <details class="section-toggle">
    <summary>Junior / AHL shootout log (manually tracked)</summary>
    <div class="section-body"><table id="minorTable"></table></div>

  </details>

  <details class="section-toggle">
    <summary>All-time NHL shootout history</summary>
    <div class="section-body" id="allTimeBody">
      <p class="note" style="padding:0 0 10px;">Loading\u2026</p>
    </div>
  </details>

</div>

function pct(pair){
  if(!pair) return null;
  const [g,a] = pair;
  return a>0 ? g/a : 0;
}
function fmtPct(pair){
  const p = pct(pair);
  if(p===null) return '<span class="no-data">\u2014</span>';
  const cls = p>=0.40 ? 'hot' : (p===0 ? 'cold' : '');
  return `<span class="pct ${cls}">${(p*100).toFixed(0)}%</span>`;
}
function fmtGA(pair){
  if(!pair || pair[1]===0) return '<span class="no-data">\u2014</span>';
  return `${pair[0]}/${pair[1]}`;
}
function last3(seasons){
  const keys = Object.keys(seasons || {}).sort().reverse().slice(0,3);
  if(!keys.length) return null;
  let g=0,a=0;
  keys.forEach(k => { g += seasons[k][0]; a += seasons[k][1]; });
  return [g,a];
}
function currentSeason(seasons){
  const keys = Object.keys(seasons || {}).sort().reverse();
  return keys.length ? seasons[keys[0]] : null;
}
// Determine the most recent season that actually has data across all loaded players
function detectCurrentSeason(players){
  const counts = {};
  players.forEach(p => {
    Object.keys(p.seasons || {}).forEach(k => {
      const att = (p.seasons[k] || [0,0])[1];
      if(att > 0) counts[k] = (counts[k] || 0) + att;
    });
  });
  const keys = Object.keys(counts).sort().reverse();
  if(!keys.length) return null;
  const best = keys[0];
  // Format nicely: "20242025" -> "2024-25"
  return { key: best, label: best.slice(0,4) + '\u2013' + best.slice(6) };
}
let CURRENT_SEASON = null;

// Sort state per panel: key = teamAbbrev, value = {col, dir}
const SORT_STATE = {};

function sortPlayers(players, col, dir, oppGoalies){
  const mult = dir === 'asc' ? 1 : -1;
  return [...players].sort((a, b) => {
    // Always push zero-career-attempt players to the bottom
    if(a.career[1] === 0 && b.career[1] > 0) return 1;
    if(b.career[1] === 0 && a.career[1] > 0) return -1;
    let av, bv;
    if(col === 'career')    { av = a.career[1]; bv = b.career[1]; }
    else if(col === 'pct')  { av = a.career[1]>0 ? a.career[0]/a.career[1] : -1; bv = b.career[1]>0 ? b.career[0]/b.career[1] : -1; }
    else if(col === 'l3')   { const al=last3(a.seasons), bl=last3(b.seasons); av=al?al[1]:-1; bv=bl?bl[1]:-1; }
    else if(col === 'cur')  { const ak=CURRENT_SEASON?.key, ac=ak?(a.seasons[ak]||null):currentSeason(a.seasons), bc=ak?(b.seasons[ak]||null):currentSeason(b.seasons); av=ac?ac[1]:-1; bv=bc?bc[1]:-1; }
    else if(col.startsWith('vsg:')){
      const gname = col.slice(4);
      const as = a.vs_goalie?.[gname]; const bs = b.vs_goalie?.[gname];
      av = as ? as[1] : -1; bv = bs ? bs[1] : -1;
    }
    else { av = 0; bv = 0; }
    // desc = highest first (bv > av means b comes first, so return positive)
    // asc  = lowest first (av > bv means a comes first, so return negative)
    return mult * (av - bv);
  });
}

function renderPanels(teamA, teamB){
  const panelsEl = document.getElementById('panels');
  const pairs = [[teamA, teamB], [teamB, teamA]];
  panelsEl.innerHTML = pairs.map(([team, opp]) => {
    if(!team || !opp) return '';
    const sort = SORT_STATE[team] || {col:'career', dir:'desc'};
    let players = PLAYERS.filter(p => p.team === team && p.active);
    const oppGoalies = GOALIES.filter(g => g.team === opp && g.active);
    const curLabel = CURRENT_SEASON ? CURRENT_SEASON.label : 'Current';
    const curKey   = CURRENT_SEASON ? CURRENT_SEASON.key   : null;

    players = sortPlayers(players, sort.col, sort.dir, oppGoalies);

    if(!players.length){
      return `<div class="team-panel">
        <div class="team-header"><span>${team} SHOOTERS</span></div>
        <div class="empty-panel">No shootout data loaded for ${team} yet.</div>
      </div>`;
    }

    const oppLabel = oppGoalies.length
      ? oppGoalies.map(g => `${g.number ? '#'+g.number+' ' : ''}${g.name.split(' ').pop()}`).join(' / ')
      : opp;

    const thClass = (col) => {
      if(sort.col !== col) return '';
      return sort.dir === 'desc' ? 'sort-desc' : 'sort-asc';
    };

    const goalieHeaders = oppGoalies.length
      ? oppGoalies.map(g => {
          const col = 'vsg:' + g.name;
          const label = g.number ? `#${g.number}` : g.name.split(' ').pop();
          return `<th class="vsg-col ${thClass(col)}" data-team="${team}" data-col="${col}">${label}</th>`;
        }).join('')
      : `<th class="vsg-col">vs ${opp}</th>`;

    return `<div class="team-panel">
      <div class="team-header">
        <span>${team} SHOOTERS</span>
        <span class="opp-goalie">vs ${oppLabel}</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Player</th>
            <th class="${thClass('career')}" data-team="${team}" data-col="career">Career</th>
            <th class="${thClass('pct')}" data-team="${team}" data-col="pct">Pct</th>
            <th class="${thClass('l3')}" data-team="${team}" data-col="l3">L3 Szn</th>
            <th class="${thClass('cur')}" data-team="${team}" data-col="cur">${curLabel}</th>
            ${goalieHeaders}
          </tr>
        </thead>
        <tbody>
          ${players.map(p => {
            const curSzn = curKey ? (p.seasons[curKey] || null) : currentSeason(p.seasons);
            const goalieCells = oppGoalies.length
              ? oppGoalies.map(g => {
                  const split = (p.vs_goalie && p.vs_goalie[g.name]) ? p.vs_goalie[g.name] : null;
                  return `<td class="vsg-col">${fmtGA(split)}</td>`;
                }).join('')
              : `<td class="vsg-col"><span class="no-data">\u2014</span></td>`;
            const numLabel = p.number ? `<span class="player-num">#${p.number}</span> ` : '';
            const noAttempts = p.career[1] === 0 ? 'no-attempts' : '';
            const isOpen = openDetails.has(`player-${p.id}-${team}`);
            return `<tr class="${noAttempts}">
              <td><span class="player-name${isOpen?' open':''}" data-playerid="${p.id}" data-team="${team}" onclick="togglePlayerDetail(this, event)">${numLabel}${p.name}</span></td>
              <td>${fmtGA(p.career)}</td>
              <td>${fmtPct(p.career)}</td>
              <td>${fmtGA(last3(p.seasons))}</td>
              <td>${fmtGA(curSzn)}</td>
              ${goalieCells}
            </tr>
            ${isOpen ? `<tr class="detail-row"><td colspan="${5 + oppGoalies.length}">${buildDetailPanel(p, oppGoalies)}</td></tr>` : ''}`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  }).join('');

  // Wire up header clicks after render
  panelsEl.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const team = th.dataset.team;
      const col  = th.dataset.col;
      const cur  = SORT_STATE[team] || {col:'career', dir:'desc'};
      SORT_STATE[team] = {
        col,
        dir: cur.col === col && cur.dir === 'desc' ? 'asc' : 'desc'
      };
      renderPanels(teamA, teamB);
    });
  });
}

function fmtShotType(st){ return st ? st.charAt(0).toUpperCase()+st.slice(1) : 'Unknown'; }
function fmtMissReason(r){ return r ? r.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()) : r; }

function buildDetailPanel(p, oppGoalies){
  const maxAtt = Math.max(1, ...Object.values(p.shot_types||{}).map(v=>v[1]));

  // Hot/cold streak from last attempts
  const streak = getStreak(p);
  const streakHtml = streak
    ? `<span class="streak-${streak.type}" style="margin-left:8px;">${streak.type==='hot'?'🔥':'❄️'} ${streak.label}</span>`
    : '';

  // Shot type breakdown
  const shotRows = Object.entries(p.shot_types||{})
    .sort((a,b)=>b[1][1]-a[1][1])
    .map(([st,[g,a]])=>{
      const pct = a>0 ? Math.round(g/a*100) : 0;
      const barW = Math.round(a/maxAtt*80);
      const label = st==='unknown' ? 'Not Recorded' : fmtShotType(st);
      return `<tr>
        <td>${label}</td>
        <td>${g}/${a} <span class="shot-bar" style="width:${barW}px;opacity:0.6;"></span></td>
        <td>${pct}%</td>
      </tr>`;
    }).join('');

  // Round performance
  const roundRows = Object.entries(p.by_round||{})
    .filter(([r])=>r!=='?')
    .sort((a,b)=>+a[0]-+b[0])
    .map(([r,[g,a]])=>{
      const pct = a>0 ? Math.round(g/a*100) : 0;
      return `<tr><td>Round ${r}</td><td>${g}/${a}</td><td>${pct}%</td></tr>`;
    }).join('');

  // Miss reasons
  const missRows = Object.entries(p.miss_reasons||{})
    .sort((a,b)=>b[1]-a[1])
    .map(([r,n])=>`<tr><td>${fmtMissReason(r)}</td><td colspan="2">${n}x</td></tr>`)
    .join('');

  // vs matchup goalies — skip 0/0, add actual shot type breakdown vs that goalie
  const vsRows = oppGoalies.map(g=>{
    const split = p.vs_goalie?.[g.name];
    if(!split || split[1]===0) return ''; // skip goalies with no attempts

    const pct = Math.round(split[0]/split[1]*100);
    const goalieLabel = `${g.number?'#'+g.number+' ':''}${g.name.split(' ').pop()}`;

    // Actual shot types used vs this specific goalie
    const vsShots = p.vs_goalie_shots?.[g.name] || {};
    const shotBreakdown = Object.entries(vsShots)
      .sort((a,b)=>b[1][1]-a[1][1])
      .map(([st,[sg,sa]])=>{
        const label = st==='unknown'?'Not Recorded':fmtShotType(st);
        return `${label} ${sg}/${sa}`;
      }).join(' · ');

    return `<tr style="border-top:1px solid var(--line);">
      <td><strong>${goalieLabel}</strong>${shotBreakdown?`<br><span style="color:var(--ink-dim);font-size:10px;">${shotBreakdown}</span>`:''}</td>
      <td>${split[0]}/${split[1]}</td>
      <td>${pct}%</td>
    </tr>`;
  }).filter(Boolean).join('');

  return `<div class="detail-panel">
    <div>
      <div class="detail-section">
        <h4>Shot Type ${streakHtml}</h4>
        <table class="detail-table">
          <tr style="color:var(--ink-dim);font-size:10px;"><td>Type</td><td>G/Att</td><td>Pct</td></tr>
          ${shotRows || '<tr><td colspan="3" style="color:var(--ink-dim)">No data</td></tr>'}
        </table>
      </div>
      <div class="detail-section" style="margin-top:12px;">
        <h4>Miss Reasons</h4>
        <table class="detail-table">
          ${missRows || '<tr><td colspan="3" style="color:var(--ink-dim)">None recorded</td></tr>'}
        </table>
      </div>
    </div>
    <div>
      <div class="detail-section">
        <h4>By Round</h4>
        <table class="detail-table">
          <tr style="color:var(--ink-dim);font-size:10px;"><td>Round</td><td>G/Att</td><td>Pct</td></tr>
          ${roundRows || '<tr><td colspan="3" style="color:var(--ink-dim)">No data</td></tr>'}
        </table>
      </div>
      <div class="detail-section" style="margin-top:12px;">
        <h4>vs This Matchup</h4>
        <table class="detail-table">
          <tr style="color:var(--ink-dim);font-size:10px;"><td>Goalie</td><td>G/Att</td><td>Pct</td></tr>
          ${vsRows || '<tr><td colspan="3" style="color:var(--ink-dim)">No attempts vs these goalies</td></tr>'}
        </table>
      </div>
    </div>
  </div>`;
}

function buildGoalieDetailPanel(g){
  const maxFaced = Math.max(1, ...Object.values(g.shots_by_type||{}).map(v=>v[1]));

  const shotRows = Object.entries(g.shots_by_type||{})
    .sort((a,b)=>b[1][1]-a[1][1])
    .map(([st,[sv,faced]])=>{
      const pct = faced>0 ? Math.round(sv/faced*100) : 0;
      const barW = Math.round(faced/maxFaced*80);
      const label = st==='unknown' ? 'Not Recorded' : fmtShotType(st);
      return `<tr>
        <td>${label}</td>
        <td>${sv}/${faced} <span class="shot-bar" style="width:${barW}px;opacity:0.6;"></span></td>
        <td>${pct}%</td>
      </tr>`;
    }).join('');

  const roundRows = Object.entries(g.by_round||{})
    .filter(([r])=>r!=='?')
    .sort((a,b)=>+a[0]-+b[0])
    .map(([r,[sv,faced]])=>{
      const pct = faced>0 ? Math.round(sv/faced*100) : 0;
      return `<tr><td>Round ${r}</td><td>${sv}/${faced}</td><td>${pct}%</td></tr>`;
    }).join('');

  const missRows = Object.entries(g.miss_reasons||{})
    .sort((a,b)=>b[1]-a[1])
    .map(([r,n])=>`<tr><td>${fmtMissReason(r)}</td><td colspan="2">${n}x (missed net)</td></tr>`)
    .join('');

  return `<div class="detail-panel">
    <div>
      <div class="detail-section">
        <h4>Save % by Shot Type</h4>
        <table class="detail-table">
          <tr style="color:var(--ink-dim);font-size:10px;"><td>Type</td><td>Sv/Faced</td><td>Sv%</td></tr>
          ${shotRows || '<tr><td colspan="3" style="color:var(--ink-dim)">No data</td></tr>'}
        </table>
      </div>
    </div>
    <div>
      <div class="detail-section">
        <h4>Save % by Round</h4>
        <table class="detail-table">
          <tr style="color:var(--ink-dim);font-size:10px;"><td>Round</td><td>Sv/Faced</td><td>Sv%</td></tr>
          ${roundRows || '<tr><td colspan="3" style="color:var(--ink-dim)">No data</td></tr>'}
        </table>
      </div>
      <div class="detail-section" style="margin-top:12px;">
        <h4>Missed Net Against</h4>
        <table class="detail-table">
          ${missRows || '<tr><td colspan="3" style="color:var(--ink-dim)">None recorded</td></tr>'}
        </table>
      </div>
    </div>
  </div>`;
}

const openDetails = new Set(); // track which player/goalie IDs have open detail rows

function togglePlayerDetail(el, event){
  event.stopPropagation();
  const pid = el.dataset.playerid;
  const team = el.dataset.team;
  const key = `player-${pid}-${team}`;
  if(openDetails.has(key)) openDetails.delete(key);
  else openDetails.add(key);
  const teamA = document.getElementById('teamASelect').value;
  const teamB = document.getElementById('teamBSelect').value;
  renderPanels(teamA, teamB);
}

function toggleGoalieDetail(el, event){
  event.stopPropagation();
  const gid = el.dataset.goalieid;
  const key = `goalie-${gid}`;
  if(openDetails.has(key)) openDetails.delete(key);
  else openDetails.add(key);
  const teamA = document.getElementById('teamASelect').value;
  const teamB = document.getElementById('teamBSelect').value;
  renderGoalies(teamA, teamB);
}

function buildSearchIndex(){
  const idx = PLAYERS.map(p => ({name:p.name, team:p.team, pct:pct(p.career)}));
  GOALIES.forEach(g => idx.push({name:g.name, team:g.team, pct:null, goalie:true}));
  return idx;
}

function renderAll(){
  const teamA = document.getElementById('teamASelect').value;
  const teamB = document.getElementById('teamBSelect').value;
  if(!teamA || !teamB){
    document.getElementById('panels').innerHTML = '<div class="empty-panel" style="grid-column:1/-1;padding:30px;text-align:center;color:var(--ink-muted);">Select an opponent above to load shootout data.</div>';
    document.getElementById('goalieRow').innerHTML = '';
    document.getElementById('gameMeta').textContent = '';
    document.getElementById('pageTitle').innerHTML = 'Edmonton Oilers <span class="vs">Shootout Scout</span>';
    document.title = 'Edmonton Oilers Shootout Scout';
    renderMinor();
    window._searchIndex = buildSearchIndex();
    return;
  }
  // Update title with matchup
  const teamAName = TEAMS.find(t => t[0] === teamA)?.[1] || teamA;
  const teamBName = TEAMS.find(t => t[0] === teamB)?.[1] || teamB;
  document.getElementById('pageTitle').innerHTML = `${teamA} <span class="vs">vs</span> ${teamB} <span class="vs" style="font-size:14px;">— Shootout Scout</span>`;
  document.getElementById('gameMeta').textContent = `${teamAName} vs ${teamBName}`;
  document.title = `${teamA} vs ${teamB} — Shootout Scout`;
  renderPanels(teamA, teamB);
  renderGoalies(teamA, teamB);
  renderMinor();
  window._searchIndex = buildSearchIndex();
}

function getStreak(p){
  // Get last 10 attempts in chronological order
  const attempts = [];
  Object.entries(p.by_round || {}).forEach(([r, [g, a]]) => {
    for(let i=0;i<a;i++) attempts.push(i<g?1:0);
  });
  if(attempts.length < 3) return null;
  const last5 = attempts.slice(-5);
  const goals = last5.filter(x=>x).length;
  if(goals === 0 && last5.length >= 3) return {type:'cold', label:`${goals}/${last5.length} last ${last5.length}`};
  if(goals >= 3) return {type:'hot', label:`${goals}/${last5.length} last ${last5.length}`};
  return null;
}

function renderSoOrder(){
  const seasonSel = document.getElementById('soOrderSeason');
  if(!seasonSel) return;

  // Populate season from both selected teams
  const teamA = document.getElementById('teamASelect').value;
  const teamB = document.getElementById('teamBSelect').value;
  const teams = [teamA, teamB].filter(Boolean);
  const allSeasons = new Set();
  teams.forEach(t => {
    if(SO_ORDER?.[t]) Object.keys(SO_ORDER[t]).forEach(s => allSeasons.add(s));
  });
  const seasons = [...allSeasons].sort().reverse();

  const curSeason = seasonSel.value;
  seasonSel.innerHTML = seasons.map(s => `<option value="${s}">${s.slice(0,4)}-${s.slice(6)}</option>`).join('');
  if(curSeason && seasons.includes(curSeason)) seasonSel.value = curSeason;

  if(seasonSel._bound !== true){
    seasonSel.addEventListener('change', renderSoOrderTable);
    seasonSel._bound = true;
  }
  renderSoOrderTable();
}

function renderTeamSoOrder(team, season){
  if(!SO_ORDER?.[team]?.[season]) return `<div class="no-data" style="padding:8px 0;">No data for ${team} this season.</div>`;
  const games = [...SO_ORDER[team][season]].reverse(); // most recent first
  if(!games.length) return `<div class="no-data" style="padding:8px 0;">No shootout games found.</div>`;

  const gameCards = games.map((g, gi) => {
    const attempts = [...g.attempts].sort((a,b)=>(a.round||99)-(b.round||99));
    const opp = g.opponent || '?';
    const outcome = g.outcome || '?';
    const outcomeColor = outcome==='W' ? 'var(--save)' : outcome==='L' ? 'var(--goal)' : 'var(--ink-dim)';
    const gid = String(g.game_id);
    let dateLabel;
    if(g.date){
      // Format 2025-10-08 -> Oct 8 2025
      const parts = g.date.split('-');
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      dateLabel = `${months[parseInt(parts[1])-1]} ${parseInt(parts[2])}, ${parts[0]}`;
    } else if(gid.length >= 10){
      // Derive approximate date context from game_id (YYYYSSGGGG format)
      const gameNum = parseInt(gid.slice(6));
      dateLabel = `Game ${gameNum}`;
    } else {
      dateLabel = `Game ${games.length - gi}`;
    }

    const chips = attempts.map(att => {
      const cls = att.result==='goal'?'goal':att.result==='save'?'save':'miss';
      const shot = att.shot_type && att.shot_type!=='unknown' ? ` · ${att.shot_type.charAt(0).toUpperCase()}` : '';
      const num = att.number ? `#${att.number} ` : '';
      const last = att.shooter.split(' ').pop();
      const resultLabel = att.result==='goal' ? 'SCORED' : att.result==='save' ? 'SAVED' : 'MISSED';
      return `<div style="margin:2px 0;display:flex;align-items:center;gap:6px;">
        <span class="attempt-chip ${cls}" style="font-size:11px;">${num}${last}${shot}</span>
        <span style="font-size:9px;color:var(--ink-dim);font-family:'IBM Plex Mono';">${resultLabel}</span>
      </div>`;
    }).join('');

    return `<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--line);">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">
        <span style="font-family:'IBM Plex Mono';font-size:10px;color:var(--ink-dim);">${dateLabel} vs ${opp}</span>
        <span style="font-family:'IBM Plex Mono';font-size:10px;font-weight:700;color:${outcomeColor};">${outcome === '?' ? '' : outcome}</span>
      </div>
      ${chips}
    </div>`;
  }).join('');

  return gameCards;
}

function renderSoOrderTable(){
  const el = document.getElementById('soOrderBody');
  if(!el) return;
  const season = document.getElementById('soOrderSeason')?.value;
  const teamA = document.getElementById('teamASelect').value;
  const teamB = document.getElementById('teamBSelect').value;

  if(!SO_ORDER || !season){
    el.innerHTML = `<div style="grid-column:1/-1;" class="no-data">No shootout order data — run the Build vs-Goalie Splits workflow first.</div>`;
    return;
  }

  const renderPanel = (team) => {
    if(!team) return '<div></div>';
    const games = SO_ORDER?.[team]?.[season] || [];
    const count = games.length;
    return `<div>
      <div style="font-family:'Oswald';font-size:13px;letter-spacing:0.5px;color:var(--ink-muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line);">
        ${team} SHOOTOUT ORDER <span style="font-size:11px;font-family:'IBM Plex Mono';font-weight:400;">(${count} game${count!==1?'s':''})</span>
      </div>
      ${renderTeamSoOrder(team, season)}
    </div>`;
  };

  el.innerHTML = renderPanel(teamA) + renderPanel(teamB);
}

const input = document.getElementById('searchInput');
const results = document.getElementById('searchResults');
input.addEventListener('input', () => {
  const q = input.value.trim().toLowerCase();
  if(!q){ results.classList.remove('show'); return; }
  const matches = (window._searchIndex || []).filter(x => x.name.toLowerCase().includes(q)).slice(0,8);
  results.innerHTML = matches.length
    ? matches.map(m => `<div class="search-result-row" data-name="${m.name}" data-team="${m.team}" data-goalie="${m.goalie||false}">
        <span>${m.name}${m.goalie ? ' (G)' : ''}</span>
        <span class="team-tag">${m.team}${m.pct!==null ? ' \u00b7 '+(m.pct*100).toFixed(0)+'%' : ''}</span>
      </div>`).join('')
    : `<div class="search-result-row"><span class="no-data">No matches loaded</span></div>`;
  results.classList.add('show');

  // Wire up click — show stats in modal
  results.querySelectorAll('.search-result-row[data-name]').forEach(row => {
    row.addEventListener('click', () => {
      const name = row.dataset.name;
      const isGoalie = row.dataset.goalie === 'true';
      results.classList.remove('show');
      input.value = '';
      if(isGoalie){
        const g = GOALIES.find(g => g.name === name);
        if(g) showSearchModal(null, g);
      } else {
        const p = PLAYERS.find(p => p.name === name);
        if(p) showSearchModal(p, null);
      }
    });
  });
});
document.addEventListener('click', (e) => { if(!e.target.closest('.search-box') && !e.target.closest('#searchModal')) results.classList.remove('show'); });

function showSearchModal(p, g){
  let existing = document.getElementById('searchModal');
  if(existing) existing.remove();

  let content, title;
  if(g){
    const svPct = g.faced ? ((g.stopped/g.faced)*100).toFixed(1) : '—';
    const numLabel = g.number ? `#${g.number} ` : '';
    title = `${numLabel}${g.name} (G) — ${g.team}`;
    content = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line);">
        <div>
          <div style="font-size:13px;color:var(--ink-muted);">${g.record||''}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'IBM Plex Mono';font-size:28px;font-weight:700;color:var(--save);">${svPct}%</div>
          <div style="font-size:11px;color:var(--ink-dim);">${g.stopped} of ${g.faced} stopped</div>
        </div>
      </div>
      ${buildGoalieDetailPanel(g)}`;
  } else {
    const numLabel = p.number ? `#${p.number} ` : '';
    title = `${numLabel}${p.name} — ${p.team||'Retired/UFA'}`;
    // Show career summary + full detail panel (no opp goalies context)
    const pctVal = p.career[1]>0 ? ((p.career[0]/p.career[1])*100).toFixed(0)+'%' : '—';
    const pctColor = p.career[1]>0 && p.career[0]/p.career[1]>=0.40 ? 'var(--hot)' : 'var(--ink)';
    content = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line);">
        <div style="font-size:13px;color:var(--ink-muted);">Career: ${p.career[0]}/${p.career[1]} attempts</div>
        <div style="font-family:'IBM Plex Mono';font-size:28px;font-weight:700;color:${pctColor};">${pctVal}</div>
      </div>
      ${buildDetailPanel(p, [])}`;
  }

  const modal = document.createElement('div');
  modal.id = 'searchModal';
  modal.style.cssText = `
    position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;
    background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:20px;`;
  modal.innerHTML = `
    <div style="background:var(--panel);border:1px solid var(--line);border-radius:12px;
      width:100%;max-width:700px;max-height:90vh;overflow-y:auto;padding:24px;position:relative;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
        <div style="font-family:'Oswald';font-size:20px;font-weight:600;letter-spacing:0.5px;">${title}</div>
        <button onclick="document.getElementById('searchModal').remove()"
          style="background:none;border:none;color:var(--ink-muted);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;">&times;</button>
      </div>
      ${content}
    </div>`;
  modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
  document.body.appendChild(modal);
}

loadData();
</script>
